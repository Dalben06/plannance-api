services:
  plannance-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: plannance-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DB_HOST=plannance-mysql
      - DB_PORT=3306
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - plannance-mysql
    networks:
      - plannance-net

  plannance-mysql:
    image: mysql:8.0
    container_name: plannance-mysql
    environment:
      - MYSQL_DATABASE=
      - MYSQL_USER=
      - MYSQL_PASSWORD=
      - MYSQL_ROOT_PASSWORD=
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - plannance-net

volumes:
  mysql_data:

networks:
  plannance-net:
    external: true
    name: plannance-net
